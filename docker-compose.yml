services:
  mongodb:
    image: mongo:8.0.4
    container_name: delivery-mongodb
    volumes:
      - mongo-data:/data/db
      - ./db-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./menu.json:/tmp/menu.json:ro
    environment:
      - MONGO_INITDB_DATABASE=delivery_db
    networks:
      - delivery-network

  springboot-app:
    build: 
      context: ./dopamine-delivery-backend
      dockerfile: Dockerfile
    container_name: delivery-backend
    environment:
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/delivery_db
      - DISH_IMAGES_PATH=/app/images/
      - SERVER_PORT=8080
    volumes:
      - ./images:/app/images
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    networks:
      - delivery-network

  nginx:
    image: nginx:1.27.4-alpine
    container_name: delivery-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./dopamine-delivery-frontend/dist/dopamine-delivery-frontend/browser:/usr/share/nginx/html/angular:ro
    depends_on:
      - springboot-app
    networks:
      - delivery-network

volumes:
  mongo-data:

networks:
  delivery-network:
    driver: bridge