<div class="dashboard-layout">

  <section class="map-section">
    <app-map-component></app-map-component>
  </section>

  <section class="search-section">
    <app-address-bar (addressSelected)="onAddressSelected($event)"></app-address-bar>
  </section>

  <section class="content-section" 
  [class.expand-vertical]="expandMenuVertical()" 
  [class.expand-horizontal]="expandMenuHorizontal()"
  [class.hide-menu]="isMenuHidden()">

    <button class="main-toggle-btn" [class.hide-menu]="isMenuHidden()"
        (click)="restaurantStateService.updateHideMenu(!isMenuHidden())"
        title="Przełącz widok menu">
      @if(isMenuHidden()){
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      }
      

      

     
    </button>
    <div class="inner-menu" [class.hide-menu]="isMenuHidden()">
      @if(expandMenuVertical() && !isMobile()){
        <button class="toggle-btn" (click)="restaurantStateService.updateExpandMenuHorizontal(!expandMenuHorizontal())">
          @if (expandMenuHorizontal()) {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          }
        </button>
      }
    
    @if (isLoading()) {
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Searching for restaurants in your area...</p>
      </div>
    } @else {
      <router-outlet></router-outlet>
    }
    </div>
  </section>
</div>
