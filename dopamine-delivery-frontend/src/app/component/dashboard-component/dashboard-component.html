<div class="dashboard-layout">

  <section class="map-section">
    <app-map-component></app-map-component>
  </section>

  <section class="search-section">
    <app-address-bar (addressSelected)="onAddressSelected($event)"></app-address-bar>
  </section>

  <section class="content-section">
    @if (isLoading()) {
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Searching for resutarants in your area...</p>
      </div>
    } @else if (deliveryService.userAddress()) {
      <div class="fade-in-results">
        <app-restaurant-list-component [restaurants]="restaurants()"></app-restaurant-list-component>
      </div>
    } @else {
      <div class="welcome-state">
        <div class="welcome-icon">🍕</div>
        <p>Enter your delivery address above to discover the best restaurants in your area!</p>
      </div>
    }
  </section>

</div>
