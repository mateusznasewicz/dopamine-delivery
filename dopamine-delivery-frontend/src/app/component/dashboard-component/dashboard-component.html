<div class="dashboard-layout">

  <section class="map-section">
    <app-map-component></app-map-component>
  </section>

  <section class="search-section">
    <app-address-bar (addressSelected)="onAddressSelected($event)"></app-address-bar>
  </section>

  <section class="content-section" [class.expand-vertical]="expandMenuVertical()" [class.expand-horizontal]="expandMenuHorizontal()">
    
    @if(expandMenuVertical() && !isMobile()){
      <button class="toggle-btn" (click)="restaurantStateService.updateExpandMenuHorizontal(!expandMenuHorizontal())">
        @if (expandMenuHorizontal()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        }
      </button>
    }
    
    @if (isLoading()) {
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Searching for restaurants in your area...</p>
      </div>
    } @else {
      <router-outlet></router-outlet>
    }

  </section>
</div>
