<div class="map-wrapper">
  <div #mapContainer class="map-container"></div>

  @if (isRouteActive()) {
    <button class="follow-btn" (click)="toggleFollow()" [class.active]="isFollowing()">
      @if (isFollowing()) {
        <span class="icon">🔒</span> Unfollow Car
      } @else {
        <span class="icon">🎥</span> Follow Car
      }
    </button>
  }
</div>
