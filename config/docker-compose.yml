services:
  mongodb:
    image: mongo:8.0.4
    container_name: delivery-mongodb
    volumes:
      - mongo-data:/data/db
      - ./db-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./menu.json:/tmp/menu.json:ro
      - ./restaurants.json:/tmp/restaurants.json:ro
    environment:
      - MONGO_INITDB_DATABASE=delivery_db
    networks:
      - delivery-network

  springboot-app:
    image: mateusznasewicz/dopamine-backend:latest
    container_name: delivery-backend
    environment:
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/delivery_db
      - DISH_IMAGES_PATH=/app/images/
      - SERVER_PORT=8080
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
      - WEBHOOK_SECRET_KEY=${WEBHOOK_SECRET_KEY}
    volumes:
      - ./images:/app/images
    depends_on:
      - mongodb
    networks:
      - delivery-network

  nginx:
    image: mateusznasewicz/dopamine-nginx:latest
    container_name: delivery-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
    depends_on:
      - springboot-app
    networks:
      - delivery-network

volumes:
  mongo-data:

networks:
  delivery-network:
    driver: bridge